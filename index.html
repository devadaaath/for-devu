<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Devu 🌸</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
overflow-x:hidden;
background:black;
color:white;
}

/* INTRO SCREEN */

.intro{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;

background:
linear-gradient(rgba(0,0,0,0.4),
rgba(0,0,0,0.75)),
url('https://images.unsplash.com/photo-1506744038136-46273834b3fb')
center/cover no-repeat;
}

/* STARS */

.stars{
position:absolute;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px, transparent 1px);

background-size:40px 40px;
opacity:0.3;

animation:moveStars 60s linear infinite;
}

@keyframes moveStars{
from{
transform:translateY(0);
}
to{
transform:translateY(-300px);
}
}

/* CONTENT */

.content{
position:relative;
z-index:2;
padding:20px;
animation:fade 2s ease;
}

h1{
font-size:60px;
color:#ffd1ea;
text-shadow:0 0 20px rgba(255,255,255,0.6);
}

.typing{
margin-top:25px;
font-size:24px;
border-right:3px solid white;
white-space:nowrap;
overflow:hidden;
width:0;
animation:
typing 5s steps(40,end) forwards,
blink 1s infinite;
}

@keyframes typing{
from{width:0}
to{width:100%}
}

@keyframes blink{
50%{
border-color:transparent;
}
}

button{
margin-top:40px;
padding:15px 35px;
border:none;
border-radius:40px;
background:pink;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.08);
}

/* LETTER */

.letter{
display:none;
min-height:100vh;
padding:100px 12%;
background:#0d0d16;
animation:fade 2s ease;
}

.letter h2{
font-size:50px;
margin-bottom:30px;
color:#ffd1ea;
}

.letter p{
font-size:24px;
line-height:2;
}

/* GALLERY */

.gallery{
margin-top:80px;
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:20px;
}

.gallery img{
width:100%;
border-radius:20px;
height:260px;
object-fit:cover;
transition:0.4s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* SAKURA */

.sakura{
position:fixed;
top:-10px;
color:pink;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh);
opacity:0;
}
}

/* FADE */

@keyframes fade{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>
</head>

<body>

<!-- INTRO -->

<section class="intro">

<div class="stars"></div>

<div class="content">

<h1>Happy Birthday Devu ✨</h1>

<div class="typing">
You make life feel like an anime movie 🌸
</div>

<button onclick="openLetter()">
Open Your Story 🌙
</button>

</div>

</section>

<!-- LETTER -->

<section class="letter" id="letter">

<h2>Dear Kutti 💌</h2>

<p>

Some people enter life normally...
but you entered mine like a cinematic anime scene.

<br><br>

Your smile feels peaceful.
Your presence feels magical.

<br><br>

Happy Birthday Devatheertha 🌸

<br><br>

— from someone who really likes you ❤️

</p>

<!-- MEMORY SECTION -->

<div class="gallery">

<img src="https://images.unsplash.com/photo-1517841905240-472988babdf9">

<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330">

<img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1">

</div>

</section>

<!-- MUSIC -->

<audio autoplay loop>
<source src="YOUR-MUSIC.mp3" type="audio/mp3">
</audio>

<script>

/* OPEN LETTER */

function openLetter(){

document.getElementById("letter")
.style.display="block";

window.scrollTo({
top:window.innerHeight,
behavior:"smooth"
});

}

/* SAKURA */

function createPetal(){

const petal=document.createElement("div");

petal.classList.add("sakura");

petal.innerHTML="🌸";

petal.style.left=Math.random()*100+"vw";

petal.style.animationDuration=
(Math.random()*5+5)+"s";

petal.style.fontSize=
(Math.random()*20+10)+"px";

document.body.appendChild(petal);

setTimeout(()=>{
petal.remove();
},10000);

}

setInterval(createPetal,300);

</script>

</body>
</html>
