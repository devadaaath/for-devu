<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Devu 🌸</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial,sans-serif;

height:100vh;
overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
135deg,
#0f172a,
#312e81,
#7e22ce,
#ec4899
);

background-size:400% 400%;

animation:bgMove 15s ease infinite;

color:white;
}

/* Animated Background */

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

/* Glow Effects */

body::before,
body::after{

content:"";

position:absolute;

width:300px;
height:300px;

border-radius:50%;

filter:blur(90px);

opacity:0.5;
}

body::before{

background:#ff4ecd;

top:-100px;
left:-100px;
}

body::after{

background:#7f5cff;

bottom:-100px;
right:-100px;
}

/* Glass Card */

.container{

position:relative;

z-index:2;

width:90%;
max-width:700px;

padding:50px;

border-radius:30px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,0.15);

box-shadow:
0 8px 32px rgba(0,0,0,0.35);

text-align:center;

animation:fadeUp 1.8s ease;
}

/* Title */

h1{

font-size:65px;

background:
linear-gradient(to right,#fff,#ffd6f5);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 25px rgba(255,255,255,0.25);
}

/* Typing */

.typing{

margin-top:25px;

font-size:22px;

white-space:nowrap;

overflow:hidden;

border-right:3px solid white;

width:0;

animation:
typing 5s steps(40,end) forwards,
blink 1s infinite;
}

@keyframes typing{

from{
width:0;
}

to{
width:100%;
}

}

@keyframes blink{

50%{
border-color:transparent;
}

}

/* Button */

button{

margin-top:40px;

padding:16px 38px;

border:none;

border-radius:50px;

background:
linear-gradient(
to right,
#ff4ecd,
#7f5cff
);

color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:0.4s;
}

button:hover{

transform:
translateY(-5px)
scale(1.05);

box-shadow:
0 0 25px rgba(255,255,255,0.35);
}

/* Hidden Letter */

#hidden{

display:none;

margin-top:35px;

font-size:22px;

line-height:1.8;

color:#ffe6ff;

animation:fadeUp 1.5s ease;
}

/* Fade Animation */

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* Sakura */

.sakura{

position:absolute;

top:-10px;

font-size:20px;

animation:fall linear forwards;
}

@keyframes fall{

to{
transform:translateY(110vh);
opacity:0;
}

}

</style>
</head>

<body>

<div class="container">

<h1>Happy Birthday Devu ✨</h1>

<div class="typing">
You make life feel like an anime movie 🌸
</div>

<button onclick="showMessage()">
Open Message 💌
</button>

<div id="hidden">

Some people enter life normally...
but you entered mine like a cinematic anime scene 🌙

<br><br>

Happy Birthday Kutti ❤️

</div>

</div>

<script>

/* Open Message */

function showMessage(){

document.getElementById("hidden")
.style.display="block";

}

/* Sakura Effect */

function createPetal(){

const petal=document.createElement("div");

petal.classList.add("sakura");

petal.innerHTML="🌸";

petal.style.left=Math.random()*100+"vw";

petal.style.animationDuration=
(Math.random()*5+5)+"s";

petal.style.fontSize=
(Math.random()*20+10)+"px";

document.body.appendChild(petal);

setTimeout(()=>{
petal.remove();
},10000);

}

setInterval(createPetal,300);

</script>

</body>
</html>
