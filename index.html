<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Devu 🌸</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:
linear-gradient(rgba(0,0,0,0.5),
rgba(0,0,0,0.7)),
url('https://images.unsplash.com/photo-1519125323398-675f0ddb6308')
center/cover no-repeat;

color:white;
text-align:center;
}

.container{
animation:fade 2s ease;
padding:20px;
}

h1{
font-size:60px;
color:#ffd1ea;
text-shadow:0 0 20px rgba(255,255,255,0.5);
}

p{
margin-top:25px;
font-size:22px;
line-height:1.8;
}

button{
margin-top:35px;
padding:15px 35px;
border:none;
border-radius:40px;
background:pink;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.08);
}

#hidden{
display:none;
margin-top:35px;
font-size:24px;
color:#ffe0f0;
animation:fade 1.5s ease;
}

@keyframes fade{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>
</head>

<body>

<div class="container">

<h1>Happy Birthday Devu ✨</h1>

<p>
To the prettiest anime soul ever 🌸
<br><br>
You make life feel cinematic, Kutti ❤️
</p>

<button onclick="showMessage()">
Open Message 🌙
</button>

<div id="hidden">
You are my favorite notification forever 💌
</div>

</div>

<script>

function showMessage(){
document.getElementById("hidden").style.display="block";
}

</script>

</body>
</html>
